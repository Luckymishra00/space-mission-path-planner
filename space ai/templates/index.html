<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Space Mission Planner 🚀</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- 🌌 BACKGROUND -->
<div class="stars"></div>
<div class="shooting-stars"></div>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand">🚀 Space Mission AI Dashboard</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- 🔥 TOP METRICS -->
    <div class="row mb-3 text-center">

        <div class="col-md-3">
            <div class="glass-card">
                <h6>⚡ Fuel</h6>
                <h4 id="fuel-metric">0</h4>
            </div>
        </div>

        <div class="col-md-3">
            <div class="glass-card">
                <h6>⏱ Time</h6>
                <h4 id="time-metric">0</h4>
            </div>
        </div>

        <div class="col-md-3">
            <div class="glass-card">
                <h6>🧠 Algorithm</h6>
                <h4 id="algo-metric">-</h4>
            </div>
        </div>

        <div class="col-md-3">
            <div class="glass-card">
                <h6>📍 Nodes</h6>
                <h4 id="nodes-metric">0</h4>
            </div>
        </div>

    </div>

    <div class="row">

        <!-- LEFT PANEL -->
        <div class="col-md-4">
            <div class="glass-card">

                <h4 class="mb-3">🛰️ Mission Control</h4>

                <label>Start Planet</label>
                <select class="form-select mb-3" id="start">
                    <option>Earth</option>
                    <option>Mercury</option>
                    <option>Venus</option>
                    <option>Mars</option>
                    <option>Jupiter</option>
                    <option>Uranus</option>
                    <option>Neptune</option>
                    <option>Saturn</option>
                    <option>Pluto</option>
                </select>

                <label>Destination</label>
                <select class="form-select mb-3" id="end">
                    <option>Pluto</option>
                    <option>Neptune</option>
                    <option>Saturn</option>
                    <option>Jupiter</option>
                    <option>Mars</option>
                </select>

                <label>Algorithm</label>
                <select class="form-select mb-3" id="algo">
                    <option>BFS</option>
                    <option>DFS</option>
                    <option>A*</option>
                    <option>Best First</option>
                    <option>Hill Climbing</option>
                    <option>Minimax</option>
                    <option>AUTO</option>
                </select>

                <button class="btn btn-space w-100 mb-2">
                    🚀 Start Mission
                </button>

                <div class="d-flex gap-2">
                    <button class="btn btn-warning w-50" onclick="location.reload()">🔄 Reset</button>
                    <button class="btn btn-secondary w-50" onclick="togglePause()">⏸ Pause</button>
                </div>

                <div class="mt-3">
                    <label>Speed</label>
                    <input type="range" min="300" max="2000" value="1000"
                           class="form-range" onchange="setSpeed(this.value)">
                </div>

                <p class="mt-3">
                    <b>AI Suggestion:</b> 
                    <span id="ai-suggestion">-</span>
                </p>

            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="col-md-8">

            <!-- 🌌 SPACE MAP -->
            <div id="space-map">

                <div class="planet" id="Mercury" style="top:80px; left:50px;">
                    <span class="planet-label">Mercury</span>
                </div>

                <div class="planet" id="Venus" style="top:120px; left:200px;">
                    <span class="planet-label">Venus</span>
                </div>

                <div class="planet" id="Earth" style="top:200px; left:100px;">
                    <span class="planet-label">Earth</span>
                </div>

                <div class="planet" id="Mars" style="top:280px; left:250px;">
                    <span class="planet-label">Mars</span>
                </div>

                <div class="planet" id="Jupiter" style="top:150px; left:400px;">
                    <span class="planet-label">Jupiter</span>
                </div>

                <div class="planet" id="Saturn" style="top:300px; left:550px;">
                    <span class="planet-label">Saturn</span>
                </div>

                <div class="planet" id="Uranus" style="top:100px; left:650px;">
                    <span class="planet-label">Uranus</span>
                </div>

                <div class="planet" id="Neptune" style="top:250px; left:750px;">
                    <span class="planet-label">Neptune</span>
                </div>

                <div class="planet" id="Pluto" style="top:150px; left:900px;">
                    <span class="planet-label">Pluto</span>
                </div>

                <!-- 🚀 Rocket -->
                <div id="rocket">🚀</div>

            </div>

            <!-- OUTPUT -->
            <div class="output-box mt-3">
                <h5>📊 Mission Output</h5>
                <p id="path">Path: -</p>
                <p id="fuel">Fuel: -</p>
                <p id="time">Time: -</p>
            </div>

            <!-- 📈 GRAPH (KEPT ✅) -->
            <div class="mt-4 text-center">
                <div style="max-width: 500px; height: 300px; margin:auto;">
                    <canvas id="lineChart"></canvas>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- JS -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

<script>
    document.querySelector(".btn-space").addEventListener("click", startMission);
</script>

</body>
</html>
